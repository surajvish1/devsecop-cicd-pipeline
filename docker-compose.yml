services:
  app:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: node-app-cicd
    restart: unless-stopped
    ports:
      - "80:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
